<!DOCTYPE html>
<html lang="en">

<head>
    <title>login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login-style.css">
</head>

<body>
    <aside class="sidebar" style="padding: 12px;">
        <div style="width: 100%; display:grid; gap: 10px;" class="sidebar-group">
            <a href="../index.html" class="sidebar-icon logo">
                <img src="https://cdn.brandfetch.io/idhTmflJvK/theme/dark/symbol.svg?c=1dxbfHSJFAPEGdCLU4o5B" alt="">
            </a>
            <a href="" class="sidebar-icon" data-tooltip="Photos"><img src="../assets/icons/photo.svg" class="icon"
                    alt=""></a>
            <a href="" class="sidebar-icon" data-tooltip="Illustrations"> <img src="../assets/icons/illustration.svg"
                    class="icon"></a>
        </div>
        <div class="divider"></div>

        <div style="display:grid; gap: 16px;">
            <a href="" class="sidebar-icon" data-tooltip="Explore"><img src="../assets/icons/compass.svg" alt=""></a>
            <a href="" class="sidebar-icon" data-tooltip="Collections"><img src="../assets/icons/collection.svg" alt=""></a>
            <a href="" class="sidebar-icon" data-tooltip="Download history"><img src="../assets/icons/downlaod.svg" alt=""></a>
        </div>

        <div class="divider"></div>

        <div>
            <a href="" class="sidebar-icon" data-tooltip="Bookmarks"><img src="../assets/icons/bookmark.svg" alt=""></a>
        </div>
        <div style="display: grid; gap: 10px; margin-top: 300px;">
            <a href="../login/index.html" class="sidebar-icon" data-tooltip="Log in / Sign up"><img
                    src="../assets/icons/contact.svg" alt=""></a>
            <a href="" class="sidebar-icon" data-tooltip="Language"><img src="../assets/icons/language.svg" alt=""></a>
             <a href="" class="sidebar-icon" data-tooltip="Menu"><img src="../assets/icons/menu.svg" alt=""></a>
        </div>
    </aside>
    <nav class="search">
        <div class="search-input">
            <input type="text" placeholder="Search photos and illustrations">
            <img src="../assets/icons/search.svg" alt="" class="icon" style="position: absolute; left: 20px;">
            <img src="../assets/icons/camera.svg" alt="" class="icon" style="position: absolute; right: 20px;">
        </div>
        <div>
            <a href="../unsplash+/index.html"><button
                    style="border: none; background: transparent; padding-inline: 12px; font-family: 'Nunito Sans', sans-serif;">Get
                    Unsplash+</button></a>
            <a href="../login/index.html"><button class="login-btn"
                    style="border: none; background: transparent; color: #767676; padding-inline: 12px;">Log
                    in</button></a>
        </div>
        <a href="../submit/index.html"> <button class="submit-btn"
                style="padding-inline: 12px; height: 32px; background: transparent; color: #767676; border-radius: 8px; border: 1px solid #d1d1d1;">Submit
                an Image</button></a>
    </nav>
    <div class="content">
        <div class="inner-content">
            <h1>Login</h1>
            <p class="subtitle">Welcome back.</p>
            <form style=" display: grid; gap: 24px;">
                <div class="field">
                    <div class="field-label-row">
                        <label for="email">Email</label>
                    </div>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot your password?</a>
                    </div>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>

        <div class="sign-up-box">
            <div class="signup-row">
                Don't have an account? <a href="../Sign-up/index.html">Join</a>
            </div>
        </div>

    </div>
</body>

</html>
